  <!-- Bulb base lines -->
  <rect x="38" y="78" width="20" height="3" rx="1.5" fill="#D4920B"/>
  <rect x="40" y="83" width="16" height="3" rx="1.5" fill="#D4920B"/>
  <path d="M42 89 Q48 94 54 89" stroke="#D4920B" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- LuxUp text -->
  <text x="100" y="62" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#1A1A2E" letter-spacing="-1">Lux</text>
  <text x="210" y="62" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#D4920B" letter-spacing="-1">Up</text>

  <!-- Tutor text -->
  <text x="274" y="62" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="40" font-weight="300" fill="#1A1A2E" opacity="0.6" letter-spacing="1">Tutor</text>
